<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TokSeDa POS</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      /* Penyesuaian khusus mobile agar lebih nyaman di jari */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .btn {
        padding: 12px;
        font-weight: 600;
        border-radius: 10px;
      }
      .table {
        font-size: 0.9rem;
      }
      #output {
        font-size: 0.85rem;
        line-height: 1.6;
        background-color: #fdfdfd !important;
      }
      .card-custom {
        border-radius: 15px;
        border: none;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container-fluid px-3 py-4">
      <div class="card card-custom p-3 mb-4">
        <h3 class="mb-2">🛒 TokSeDa</h3>
        <p class="text-muted mb-0" style="font-size: 0.95rem">
          Selamat Datang <b>Diandra</b> 👋<br />
          Terima Kasih Telah Menghubungi TokSeDa.
        </p>
      </div>

      <div class="d-grid gap-2 d-md-flex mb-4">
        <button class="btn btn-primary" onclick="tampilkanData()" id="btnData">
          Tampilkan Data
        </button>
        <button class="btn btn-danger" onclick="batalkanPembelian()">
          Batalkan
        </button>
        <button class="btn btn-warning" onclick="opsiCicilan()">Cicilan</button>
        <button class="btn btn-success" onclick="setujuPembelian()">
          Setuju
        </button>
        <button
          class="btn btn-secondary"
          onclick="tampilkanRiwayat()"
          id="btnRiwayat"
        >
          Riwayat
        </button>
      </div>

      <div class="table-responsive shadow-sm rounded">
        <table class="table table-bordered bg-white mb-0">
          <thead class="table-dark">
            <tr>
              <th>Nama</th>
              <th>Barang</th>
              <th>Harga</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr>
              <td colspan="3" class="text-center text-muted py-4">
                Belum ada data
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="alert alert-dark mt-3 py-3 shadow-sm">
        <h5 id="total" class="mb-0 text-center">Total: Rp 0</h5>
      </div>

      <div class="mt-4">
        <h6 class="fw-bold">📋 Output Log</h6>
        <div
          id="output"
          class="bg-white p-3 border rounded shadow-sm"
          style="min-height: 120px; max-height: 350px; overflow-y: auto"
        ></div>
      </div>
    </div>

    <script>
      // ================= DATA =================
      let data_pembelian = [
        { nama: "Diandra", barang: "HP IP 17 Pro Max", harga: 24999000 },
        { nama: "Gazzael", barang: "Motor Aerox New", harga: 41700000 },
        { nama: "Ismail", barang: "PS 5", harga: 10000000 },
      ];

      let riwayat_pembatalan = [];
      let riwayat_pembelian = [];
      let showRiwayat = false;
      let showData = false;

      // ================= HELPER =================
      function updateOutput(text) {
        document.getElementById("output").innerHTML = text;
      }

      function hitungTotal() {
        return data_pembelian.reduce((t, d) => t + d.harga, 0);
      }

      // ================= TAMPILKAN DATA =================
      function tampilkanData() {
        let tbody = document.getElementById("table-body");
        let total = document.getElementById("total");

        showData = !showData;

        if (!showData) {
          tbody.innerHTML = `
            <tr>
              <td colspan="3" class="text-center text-muted py-3">Data disembunyikan</td>
            </tr>
          `;
          total.innerText = "Total: Rp 0";
          document.getElementById("btnData").innerText = "Tampilkan Data";
          return;
        }

        tbody.innerHTML = "";

        if (data_pembelian.length === 0) {
          tbody.innerHTML = `<tr><td colspan="3" class="text-center py-3">Kosong</td></tr>`;
        } else {
          data_pembelian.forEach((data) => {
            tbody.innerHTML += `
              <tr>
                <td>${data.nama}</td>
                <td>${data.barang}</td>
                <td>Rp ${data.harga.toLocaleString()}</td>
              </tr>
            `;
          });
        }

        total.innerText = "Total: Rp " + hitungTotal().toLocaleString();
        document.getElementById("btnData").innerText = "Sembunyikan Data";
      }

      // ================= BATALKAN =================
      function batalkanPembelian() {
        Swal.fire({
          title: "Batal Beli",
          text: "Masukkan Nama Untuk Membatalkan Pembelian",
          input: "text",
          inputPlaceholder: "Contoh: Diandra",
          showCancelButton: true,
          confirmButtonColor: "#d33",
        }).then((result) => {
          if (!result.isConfirmed || !result.value) return;

          let nama = result.value;

          Swal.fire({
            title: "Pilih Alasan",
            input: "select",
            inputOptions: {
              "Harga Tidak Masuk Akal": "Harga Tidak Masuk Akal",
              "Tidak Diperlukan": "Tidak Diperlukan",
              "Pengiriman Lama": "Pengiriman Lama",
              "Salah Pesan": "Salah Pesan",
              "Salah Alamat": "Salah Alamat",
            },
            showCancelButton: true,
          }).then((resAlasan) => {
            if (!resAlasan.isConfirmed) return;

            let alasanText = resAlasan.value;

            Swal.fire({
              title: "Memproses...",
              text: "Mohon tunggu",
              allowOutsideClick: false,
              didOpen: () => {
                Swal.showLoading();
              },
            });

            setTimeout(() => {
              let ditemukan = false;

              data_pembelian = data_pembelian.filter((data) => {
                if (data.nama.toLowerCase() === nama.toLowerCase()) {
                  riwayat_pembatalan.push({
                    ...data,
                    waktu: new Date().toLocaleString(),
                    alasan: alasanText,
                  });
                  ditemukan = true;
                  return false;
                }
                return true;
              });

              tampilkanData();

              if (ditemukan) {
                Swal.fire(
                  "Berhasil!",
                  `${nama} berhasil dibatalkan`,
                  "success",
                );
              } else {
                Swal.fire(
                  "Gagal",
                  "Nama tidak ditemukan dalam daftar",
                  "error",
                );
              }
            }, 1500);
          });
        });
      }

      // ================= CICILAN =================
      function opsiCicilan() {
        Swal.fire({
          title: "Cek Cicilan",
          input: "text",
          inputPlaceholder: "Masukkan Nama Pembeli",
          showCancelButton: true,
        }).then((result) => {
          if (!result.isConfirmed || !result.value) return;

          let nama = result.value;
          let data = data_pembelian.find(
            (d) => d.nama.toLowerCase() === nama.toLowerCase(),
          );

          if (!data) {
            return Swal.fire("Error", "Nama tidak ditemukan", "error");
          }

          Swal.fire({
            title: "Pilih Tenor",
            input: "select",
            inputOptions: {
              3: "3 Bulan",
              6: "6 Bulan",
              12: "12 Bulan",
            },
            showCancelButton: true,
          }).then((resTenor) => {
            if (!resTenor.isConfirmed) return;

            let tenor = parseInt(resTenor.value);
            let cicilan = data.harga / tenor;
            let hari = Math.floor(Math.random() * 5) + 3;

            Swal.fire({
              icon: "info",
              title: "Detail Cicilan",
              html: `
                <div class='text-start'>
                  <b>👤 Nama:</b> ${data.nama}<br>
                  <b>📦 Barang:</b> ${data.barang}<br>
                  <b>🗓️ Tenor:</b> ${tenor} Bulan<br><hr>
                  <b>💰 Cicilan:</b> Rp ${cicilan.toLocaleString()} / bulan<br>
                  <b>🚚 Estimasi:</b> ${hari} hari tiba
                </div>
              `,
            });
          });
        });
      }

      // ================= SETUJU =================
      function setujuPembelian() {
        Swal.fire({
          title: "Konfirmasi Setuju",
          input: "text",
          inputPlaceholder: "Masukkan Nama Pembeli",
          showCancelButton: true,
        }).then((result) => {
          if (!result.isConfirmed || !result.value) return;

          let nama = result.value;
          let data = data_pembelian.find(
            (d) => d.nama.toLowerCase() === nama.toLowerCase(),
          );

          if (!data) {
            return Swal.fire("Error", "Nama tidak ditemukan", "error");
          }

          Swal.fire({
            title: "Konfirmasi",
            text: `Setujui pembelian ${data.nama} untuk ${data.barang}?`,
            icon: "question",
            showCancelButton: true,
            confirmButtonText: "Ya, Setuju",
          }).then((confirm) => {
            if (!confirm.isConfirmed) return;

            Swal.fire({
              title: "Menyimpan Data...",
              allowOutsideClick: false,
              didOpen: () => Swal.showLoading(),
            });

            setTimeout(() => {
              let now = new Date();
              let estimasi = Math.floor(Math.random() * 5) + 3;
              let tanggalTiba = new Date();
              tanggalTiba.setDate(now.getDate() + estimasi);

              riwayat_pembelian.push({
                nama: data.nama,
                barang: data.barang,
                waktu: now.toLocaleString(),
                estimasi: tanggalTiba.toLocaleDateString(),
              });

              Swal.fire({
                icon: "success",
                title: "Berhasil Disetujui",
                html: `Pesanan <b>${data.nama}</b> sedang diproses.<br>Estimasi tiba: ${tanggalTiba.toLocaleDateString()}`,
              });
            }, 1500);
          });
        });
      }

      // ================= RIWAYAT =================
      function tampilkanRiwayat() {
        let container = document.getElementById("output");
        let btn = document.getElementById("btnRiwayat");

        showRiwayat = !showRiwayat;

        if (!showRiwayat) {
          container.innerHTML = "";
          btn.innerText = "Tampilkan Riwayat";
          return;
        }

        btn.innerText = "Sembunyikan Riwayat";

        if (riwayat_pembatalan.length === 0) {
          container.innerHTML =
            "<div class='text-muted italic'>Belum ada riwayat pembatalan.</div>";
          return;
        }

        let html = "";
        riwayat_pembatalan.forEach((data) => {
          html += `
            <div class="mb-2 p-2 border-bottom">
              <span class="text-danger fw-bold">❌ ${data.nama}</span> - ${data.barang}<br>
              <small class="text-muted">🕒 ${data.waktu}</small><br>
              <span class="badge bg-light text-dark border">📌 ${data.alasan}</span>
            </div>
          `;
        });

        container.innerHTML = html;
      }
    </script>
  </body>
</html>
